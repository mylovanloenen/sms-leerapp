<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SMS Leerapp{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; font-size: 1.4rem; }
    .badge-state-NEW          { background: #6c757d; }
    .badge-state-LANG_PENDING { background: #fd7e14; }
    .badge-state-LEARNING     { background: #0d6efd; }
    .badge-state-COMPLETED    { background: #198754; }
    .step-done    { color: #198754; }
    .step-current { color: #0d6efd; font-weight: 700; }
    .step-pending { color: #adb5bd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">📱 SMS Leerapp</a>
      <span class="text-white-50 small">Dashboard</span>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
